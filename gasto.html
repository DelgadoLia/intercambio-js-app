<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Estilo Mexicano</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top" style="background-color: rgba(223, 200, 168);">
        <div class="container">
            <img src="imagenes/logoIntercambio.png" alt="Logo" class="logo">
            <a href="index.html" class="navbar-brand fw-bold" onclick="verificarlocalStorage(event)">MIX MEX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="navMenu" class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a href="base.html" class="nav-link">Iniciar</a></li>
                </ul>
                
            </div>

        </div>
    </nav>

    

    <section class="cuadroInformacion">
        <div class="imgCarga6">
            <img src="imagenes/piñataS.png" alt="pi1">
            <img src="imagenes/piñataS.png" alt="pi2">
            <img src="imagenes/piñataS.png" alt="pi3">
            <img src="imagenes/piñataS.png" alt="pi4">
            <img src="imagenes/piñataS.png" alt="pi5">
            <img src="imagenes/piñataS.png" alt="pi6">
            <img src="imagenes/piñataS.png" alt="pi7">
        </div>
        <div class="cuadro">
            <h1>¿Cuánto deberían gastar los participantes?</h1>
            <div class="container">
                <div class="row">
                    <div class="col-12 col-md-6">
                        <button class="btn btn100 mb-2" id="btn100">$100</button><br>
                        <button class="btn btn150 mb-2" id="btn150">$150</button>
                    </div>
                    <div class="col-12 col-md-6">
                        <button class="btn btn200 mb-2" id="btn200">$200</button><br>
                        <button id="btngasto" class="btn btnOtro mb-2" onclick="mostrar(this)">Otro</button>
                    </div>

                </div>
            </div>
            <h1 id="personalizadoGasto">Presupuesto personalizado</h1>
            <input type="text" id="gastoText" placeholder="Introduce un gasto personalizado">
            <button class="btnInicio" onclick="irPagina7()"><img src="imagenes/dragonzitos.png" alt="Boton"></button>
        </div>
        <div class="alerta">
            <div id="liveAlertPlaceholder"></div>
            <button class="btnAgregar" onclick="regresar5()">←</button>
            <button type="button" class="btn btn-primary" id="liveAlertBtn">¿Deseas continuar?</button>
        </div>
        
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script/script.js"></script>

</html>
