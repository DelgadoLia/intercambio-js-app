<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Estilo Mexicano</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top" style="background-color: rgba(223, 200, 168);">
        <div class="container">
            <img src="imagenes/logoIntercambio.png" alt="Logo" class="logo">
            <a href="index.html" class="navbar-brand fw-bold">Intercambio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="navMenu" class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a href="base.html" class="nav-link">Iniciar</a></li>
                </ul>
                
            </div>

        </div>
    </nav>

    <div class="zonaDrag">
        <img id="dulce1" src="imagenes/mazapanS.png" draggable="true" class="dulce">
        <img id="dulce2" src="imagenes/tamborcito.png" draggable="true" class="dulce">
        <img id="dulce3" src="imagenes/pelonS.png" draggable="true" class="dulce">
        <img id="dulce4" src="imagenes/pulparindo.png" draggable="true" class="dulce">
    </div>
    <div class="botonesFijos text-center mt-4">
        <button class="btn btnTematicaNa">Navidad</button>
        <button class="btn btnTematicaV">San Valentin</button>
        <button class="btn btnTematicaM">Día de la Madre</button>
        <button class="btn btnTematicaN">Día del Niño</button>
    </div>

    <section class="cuadroInformacion">
        <div class="imgCarga4">
            <img src="imagenes/piñataS.png" alt="pi1">
            <img src="imagenes/piñataS.png" alt="pi2">
            <img src="imagenes/piñataS.png" alt="pi3">
            <img src="imagenes/piñataS.png" alt="pi4">
            <img src="imagenes/piñataS.png" alt="pi5">
            <img src="imagenes/piñataS.png" alt="pi6">
            <img src="imagenes/piñataS.png" alt="pi7">
        </div>
        <div class="cuadro">
            <h1>¿Para qué vas a sortear nombres?</h1>
            <h4>Arrastra los dulces que están fuera del recuadro para tener ideas</h4>
            <input type="text" id="tematica" placeholder="Escribe aquí">
            <button class="btnInicio" onclick="irPagina4()"><img src="imagenes/obleas.png" alt="Boton"></button>
        </div>
        <div class="alerta">
            <div id="liveAlertPlaceholder"></div>
            <button class="btnAgregar" onclick="regresar3()">←</button>
            <button type="button" class="btn btn-primary" id="liveAlertBtn">¿Deseas continuar?</button>
        </div>
        
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/script.js"></script>

</body>
</html>
