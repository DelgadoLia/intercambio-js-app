<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Estilo Mexicano</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top" style="background-color: rgba(223, 200, 168);">
        <div class="container">
            <img src="imagenes/logoIntercambio.png" alt="Logo" class="logo">
            <a href="index.html" class="navbar-brand fw-bold" onclick="verificarlocalStorage(event)">MIX MEX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="navMenu" class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a href="base.html" class="nav-link">Iniciar</a></li>
                </ul>
                
            </div>

        </div>
    </nav>

    <section class="cuadroInformacion">
        <div class="imgCarga2">
            <img src="imagenes/piñataS.png" alt="pi1">
            <img src="imagenes/piñataS.png" alt="pi2">
            <img src="imagenes/piñataS.png" alt="pi3">
            <img src="imagenes/piñataS.png" alt="pi4">
            <img src="imagenes/piñataS.png" alt="pi5">
            <img src="imagenes/piñataS.png" alt="pi6">
            <img src="imagenes/piñataS.png" alt="pi7">
        </div>
        <div class="cuadro">
            <h1>¿Con quién vas a sortear?</h1>
            <div id="listaNombres">
                <div class="item">
                    <h3 id="printNombre"></h3>
                    <button class="btnEliminar" id="eliminarBotonAd" onclick="eliminarNombreAdmin(this)">x</button>
                </div>
            </div>
            <button class="btnAgregar" onclick="agregarNombre()">+</button>
            <button class="btnInicio" onclick="irPagina3()"><img src="imagenes/pulparindo.png" alt="Boton" style="width:40%;"></button>
        </div>
        <div class="alerta">
            <div id="liveAlertPlaceholder"></div>
            <button class="btnAgregar" onclick="regresar1()">←</button>
            <button type="button" class="btn btn-primary" id="liveAlertBtn">¿Deseas continuar?</button>
        </div>
        
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script/script.js"></script>

</body>
</html>
